[mypy]
python_version = 3.11
warn_return_any = True
warn_unused_configs = True
disallow_untyped_defs = True
disallow_incomplete_defs = True
check_untyped_defs = True
ignore_missing_imports = True

[mypy-backend.pipeline.*]
disallow_untyped_defs = True

[mypy-backend.routes.*]
disallow_untyped_defs = True

[mypy-backend.utils.*]
disallow_untyped_defs = True

[mypy-tests.*]
disallow_untyped_defs = False

# Gradual typing: ignore errors in legacy modules
[mypy-backend.governance]
ignore_errors = True

[mypy-backend.job_queue]
ignore_errors = True

[mypy-backend.llm_client]
ignore_errors = True

[mypy-backend.lsd_v1_2]
ignore_errors = True

[mypy-backend.modulation]
ignore_errors = True

[mypy-backend.debate_proposal]
ignore_errors = True

[mypy-backend.scoring_engine]
ignore_errors = True

[mypy-backend.extraction]
ignore_errors = True

[mypy-skills.*]
ignore_errors = True
