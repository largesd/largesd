name: Python Checks

on:
  push:
  pull_request:

jobs:
  checks:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run default checks
        run: python scripts/dev_workflow.py check

      - name: Run smoke test
        run: python scripts/dev_workflow.py smoke --scenario server-check --port 5055 --timeout 45
