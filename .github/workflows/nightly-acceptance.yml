name: Nightly Acceptance

on:
  schedule:
    - cron: "0 9 * * *"
  workflow_dispatch:

jobs:
  acceptance:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install -r requirements-test.txt

      - name: Install Playwright browser
        run: python -m playwright install --with-deps chromium

      - name: Run browser acceptance suite
        run: python scripts/dev_workflow.py acceptance --port 5080 --timeout 60

      - name: Upload acceptance artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-acceptance-artifacts
          path: artifacts/acceptance
          if-no-files-found: ignore

      - name: Open issue on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            const today = new Date().toISOString().slice(0, 10);
            const title = `[Nightly Acceptance] Failure on ${today}`;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const body = [
              "The nightly browser acceptance workflow failed.",
              "",
              `Run: ${runUrl}`,
              "",
              "Next step:",
              "- inspect the uploaded acceptance artifacts",
              "- review the failing acceptance criteria",
              "- fix the regression or update the criteria if the product changed intentionally"
            ].join("\n");

            const { data: issues } = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: "open",
              per_page: 100
            });

            const existing = issues.find(issue => issue.title === title);
            if (existing) {
              core.info(`Issue already exists: #${existing.number}`);
              return;
            }

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title,
              body
            });
