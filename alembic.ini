# Blind Debate Adjudicator — Alembic configuration
# Usage:
#   DATABASE_URL=postgresql://... alembic upgrade head
#   DATABASE_URL=sqlite:///data/debate_system.db alembic upgrade head
#   alembic revision -m "description" --autogenerate  # (autogenerate disabled; no SA models)

[alembic]
script_location = %(here)s/alembic
prepend_sys_path = .
version_path_separator = os

# Database URL is read from DATABASE_URL env var in env.py.
# This placeholder is required for Alembic CLI but overridden at runtime.
sqlalchemy.url = sqlite:///data/debate_system.db

# Logging
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
