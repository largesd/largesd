<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Redirecting to Evidence & Audits…</title>
  <meta name="robots" content="noindex" />
  <script>
    (function redirectToMergedPage() {
      const params = new URLSearchParams(window.location.search);
      params.set('tab', 'evidence');
      const query = params.toString();
      const destination = `audits.html${query ? `?${query}` : ''}${window.location.hash || ''}`;
      window.location.replace(destination);
    })();
  </script>
</head>
<body>
  <p>Redirecting to <a href="audits.html?tab=evidence">Evidence &amp; Audits</a>...</p>
</body>
</html>
